<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Number Analyzer System</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    text-align: center;
    padding: 20px;
}

.container {
    background: white;
    padding: 20px;
    width: 400px;
    margin: auto;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
}

input, button {
    padding: 10px;
    width: 90%;
    margin: 10px 0;
}

button {
    background: #3498db;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #2980b9;
}

.result {
    text-align: left;
    margin-top: 20px;
}

.highlight {
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>Number Analyzer</h2>
    
    <input type="number" id="num" placeholder="Enter N">
    <button onclick="runProgram()">Run</button>

    <div class="result" id="output"></div>
</div>

<script>
function runProgram() {

    var N = parseInt(document.getElementById("num").value);
    var output = "";

    // 1. Pattern
    output += "<b>Pattern:</b><br>";
    var i = 1;
    while (i <= N) {
        var j = 1;
        while (j <= i) {
            output += j + " ";
            j++;
        }
        output += "<br>";
        i++;
    }

    // 2. Even / Odd count
    var even = 0, odd = 0;
    i = 1;
    while (i <= N) {
        if (i % 2 == 0)
            even++;
        else
            odd++;
        i++;
    }

    output += "<br><b>Even Count:</b> " + even;
    output += "<br><b>Odd Count:</b> " + odd;

    // 3. Sum divisible by 3 AND 5
    var sum = 0;
    i = 1;
    while (i <= N) {
        if (i % 3 == 0 && i % 5 == 0) {
            sum += i;
        }
        i++;
    }

    output += "<br><b>Sum (Divisible by 3 & 5):</b> " + sum;

    // 4. Reverse + highlight divisible by 4
    output += "<br><br><b>Reverse Order:</b><br>";
    i = N;
    while (i >= 1) {
        if (i % 4 == 0)
            output += "<span class='highlight'>" + i + "</span> ";
        else
            output += i + " ";
        i--;
    }

    // 5. Prime numbers
    output += "<br><br><b>Prime Numbers:</b><br>";
    i = 2;

    while (i <= N) {
        var isPrime = 1;
        var j = 2;

        while (j < i) {
            if (i % j == 0) {
                isPrime = 0;
            }
            j++;
        }

        if (isPrime == 1) {
            output += i + " ";
        }

        i++;
    }

    document.getElementById("output").innerHTML = output;
}
</script>

</body>
</html>
