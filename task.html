<!DOCTYPE html>
<html>
<head>
<title>Advanced Smart Billing System</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.container{
width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:90%;
padding:8px;
margin:8px;
}

button{
padding:10px 20px;
background:green;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:darkgreen;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid gray;
padding:8px;
}

th{
background:#eee;
}

</style>
</head>

<body>

<div class="container">

<h2>Smart Billing System</h2>

<input type="text" id="name" placeholder="Enter Customer Name">

<input type="number" id="amount" placeholder="Enter Purchase Amount">

<br>

<button onclick="generateBill()">Generate Bill</button>

<div id="bill"></div>

</div>

<script>

function generateBill(){

let name = document.getElementById("name").value;
let amount = parseFloat(document.getElementById("amount").value);

if(name=="" || isNaN(amount) || amount<=0){
document.getElementById("bill").innerHTML="<p style='color:red'>Invalid Input</p>";
return;
}

let discountRate=0;

if(amount>=5000){
discountRate=0.20;
}
else if(amount>=3000){
discountRate=0.10;
}
else if(amount>=1000){
discountRate=0.05;
}

let discount=amount*discountRate;

let afterDiscount=amount-discount;

let tax=afterDiscount*0.05;

let finalBill=afterDiscount+tax;

let status="Regular Customer";

if(finalBill>4000){
status="Premium Customer";
}

document.getElementById("bill").innerHTML=`

<h3>Customer Receipt</h3>

<table>

<tr>
<th>Customer Name</th>
<td>${name}</td>
</tr>

<tr>
<th>Original Amount</th>
<td>${amount.toFixed(2)}</td>
</tr>

<tr>
<th>Discount</th>
<td>${discount.toFixed(2)}</td>
</tr>

<tr>
<th>Tax (5%)</th>
<td>${tax.toFixed(2)}</td>
</tr>

<tr>
<th>Final Bill</th>
<td>${finalBill.toFixed(2)}</td>
</tr>

<tr>
<th>Status</th>
<td>${status}</td>
</tr>

</table>

`;

}

</script>

</body>
</html>
